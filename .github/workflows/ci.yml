name: Foundation CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundation-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  source:
    name: Foundation source gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the reviewed commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up the pinned Node runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Enable the pinned package manager
        run: |
          corepack enable pnpm
          pnpm --version

      - name: Install the frozen dependency graph
        run: pnpm install --frozen-lockfile

      - name: Check tracked source formatting
        run: pnpm format:check

      - name: Check TypeScript
        run: pnpm typecheck

      - name: Check ESLint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Generate the registry
        run: pnpm registry:build

      - name: Compile guide sources
        run: pnpm guides:build

      - name: Generate deterministic static-data fixtures
        run: pnpm static-data:fixture

      - name: Build the static export
        run: pnpm build

      - name: Reject tracked generated-output drift
        run: git diff --exit-code -- .

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out dependency manifests
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          license-check: true
          vulnerability-check: true
          comment-summary-in-pr: never
          retry-on-snapshot-warnings: true
